services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: signalcraft
      POSTGRES_USER: signalcraft
      POSTGRES_PASSWORD: signalcraft
    ports:
      - "5432:5432"
    volumes:
      - signalcraft-db:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  signalcraft-db:
